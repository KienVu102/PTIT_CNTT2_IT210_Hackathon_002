<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm nhân viên mới</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        .container { max-width: 600px; margin-top: 30px; }
        .error-text { color: red; font-size: 14px; }
        .help-text { color: #666; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Thêm nhân viên mới</h2>

    <form th:action="@{/employees/create}" th:object="${employee}" method="post" novalidate>

        <div class="mb-3">
            <label class="form-label">Họ và tên <span style="color: red">*</span></label>
            <input type="text" class="form-control" th:field="*{fullName}"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                   placeholder="Nhập họ và tên"/>
            <div class="error-text" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            <div class="help-text" th:unless="${#fields.hasErrors('fullName')}">5-50 ký tự</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Chức vụ <span style="color: red">*</span></label>
            <input type="text" class="form-control" th:field="*{position}"
                   th:classappend="${#fields.hasErrors('position')} ? 'is-invalid' : ''"
                   placeholder="Nhập chức vụ"/>
            <div class="error-text" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></div>
            <div class="help-text" th:unless="${#fields.hasErrors('position')}">Không được để trống</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Lương <span style="color: red">*</span></label>
            <input type="text" class="form-control" th:field="*{salary}"
                   th:classappend="${#fields.hasErrors('salary')} ? 'is-invalid' : ''"
                   placeholder="Nhập mức lương"/>
            <div class="error-text" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></div>
            <div class="help-text" th:unless="${#fields.hasErrors('salary')}">Số > 0</div>
        </div>

        <div class="mb-4">
            <label class="form-label">Ảnh đại diện</label>
            <input type="text" class="form-control" th:field="*{avatar}"
                   placeholder="URL ảnh (nếu có)"/>
            <div class="help-text">Không bắt buộc</div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/employees/list}" href="/employees/list" class="btn btn-secondary">Quay lại</a>
        </div>

    </form>
</div>
</body>
</html>

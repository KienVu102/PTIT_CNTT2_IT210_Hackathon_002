<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nhân viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background: #fff; }
        .page-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .avatar-img { width: 40px; height: 40px; object-fit: cover; border-radius: 50%; }
        .avatar-placeholder { color: #888; }
        .empty-msg { color: #6c757d; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>
<div class="container mt-4">

    <div class="page-header">
        <h2 class="fw-bold mb-0">Quản lý nhân viên</h2>
        <a th:href="@{/employees/create}" href="/employees/create" class="btn btn-primary">Thêm nhân viên mới</a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success mb-3" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-danger mb-3"   th:text="${errorMsg}"></div>

    <form method="get" th:action="@{/employees/list}" action="/employees/list" class="mb-3">
        <div class="d-flex gap-2">
            <input type="text" name="keyword" class="form-control" style="max-width:400px"
                   placeholder="Tìm kiếm theo tên hoặc chức vụ..."
                   th:value="${keyword}"/>
            <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            <a th:href="@{/employees/list}" href="/employees/list" class="btn btn-secondary">Xóa bộ lọc</a>
        </div>
    </form>

    <div th:if="${keyword != null and !keyword.isEmpty() and employees.isEmpty()}" class="empty-msg">
        Không tìm thấy nhân viên nào với từ khóa: <strong th:text="${keyword}"></strong>
    </div>

    <div th:if="${(keyword == null or keyword.isEmpty()) and employees.isEmpty()}" class="empty-msg">
        Hiện chưa có nhân sự nào trong hệ thống.
    </div>

    <table class="table" th:if="${!employees.isEmpty()}">
        <thead>
        <tr>
            <th style="width:60px">STT</th>
            <th>Mã nhân viên</th>
            <th>Họ và tên</th>
            <th>Chức vụ</th>
            <th>Lương</th>
            <th>Ảnh đại diện</th>
            <th style="width:160px">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp, stat : ${employees}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.fullName}"></td>
            <td th:text="${emp.position}"></td>
            <td th:text="${#numbers.formatInteger(emp.salary, 0, 'COMMA')} + ' VNĐ'"></td>
            <td class="text-center">
                <img th:if="${emp.avatar != null and !emp.avatar.isEmpty()}"
                     th:src="${emp.avatar}" class="avatar-img" alt="Avatar"/>
                <span th:if="${emp.avatar == null or emp.avatar.isEmpty()}"
                      class="avatar-placeholder">Không có ảnh</span>
            </td>
            <td>
                <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-warning btn-sm">Chỉnh sửa</a>
                <a th:href="@{/employees/delete/{id}(id=${emp.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc muốn xóa nhân viên này không?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
